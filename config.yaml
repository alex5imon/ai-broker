# =============================================================================
# Trading Bot Configuration - V5 (Alpaca)
# =============================================================================
# This file is the single source of truth for all tunable parameters.
# Never hardcode values that belong here.
# =============================================================================

# -----------------------------------------------------------------------------
# Account Settings
# -----------------------------------------------------------------------------
account:
  base_currency: "USD"
  trading_mode: "live"              # 'live' or 'backtest'
  phase_override: null              # Set to 0, 1, 2, or 3 to force a phase (null = auto-detect)

# -----------------------------------------------------------------------------
# Alpaca Connection
# -----------------------------------------------------------------------------
alpaca:
  # API keys are read from environment variables:
  #   ALPACA_API_KEY
  #   ALPACA_SECRET_KEY
  paper: true                        # true = paper trading, false = live
  data_feed: "iex"                   # "iex" (free) or "sip" (paid, all exchanges)
  max_retries: 5
  retry_backoff_seconds: 30
  # Suppress ntfy noise from transient Alpaca REST blips. The "connection
  # lost" / "reconnected" pair only fires when the outage has persisted
  # past this threshold. Exhausted-retries CRITICAL alerts always fire
  # regardless. Default 120s — Alpaca transient blips are almost always
  # under a minute; outages worth notifying about are longer.
  reconnect_alert_threshold_seconds: 120

# -----------------------------------------------------------------------------
# Market Data
# -----------------------------------------------------------------------------
market_data:
  staleness_threshold_seconds: 300    # IEX-only feed has natural multi-minute gaps on ETFs
  resubscribe_wait_seconds: 15
  resubscribe_retry_seconds: 60
  # With a 2-symbol watchlist, 1 stale symbol = 50%, which would trip the default.
  # Raise trip point so both must be stale before pausing trading.
  mass_staleness_pct: 0.95
  mass_staleness_resume_pct: 0.50
  # Alpaca's free paper IEX websocket is notoriously sparse — it often emits
  # zero ticks for liquid ETFs for many minutes at a time. Strategies fetch
  # fresh bars via REST on every scan, so streaming staleness is not a
  # sufficient reason to halt trading. When this flag is false, mass staleness
  # still logs a CRITICAL warning but does NOT pause entry scans, per-symbol
  # is_stale() always returns False, and get_latest_price() falls back to the
  # latest REST bar close if no live tick has been received.
  pause_on_mass_staleness: false

# -----------------------------------------------------------------------------
# Market Schedule (US only)
# -----------------------------------------------------------------------------
schedule:
  us:
    pre_market_scan_start: "09:15"  # ET
    pre_market_scan_end: "09:30"
    market_open: "09:30"
    execution_start: "09:35"        # Skip first 5 min
    execution_end: "15:50"
    wind_down_start: "15:50"
    wind_down_end: "15:58"
    market_close: "16:00"
    timezone: "US/Eastern"
  warmup_minutes: 15
  late_start_close_only_after_us: "15:30"   # ET - US market
  bot_start_gmt: "13:30"           # Adjusted for US-only (09:30 ET ~ 13:30 GMT)
  bot_end_gmt: "21:00"

# -----------------------------------------------------------------------------
# Holiday Calendar (update annually)
# -----------------------------------------------------------------------------
holidays:
  us_2026:
    - "2026-01-01"  # New Year's Day
    - "2026-01-19"  # MLK Day
    - "2026-02-16"  # Presidents' Day
    - "2026-04-03"  # Good Friday
    - "2026-05-25"  # Memorial Day
    - "2026-06-19"  # Juneteenth
    - "2026-07-03"  # Independence Day (observed)
    - "2026-09-07"  # Labor Day
    - "2026-11-26"  # Thanksgiving
    - "2026-12-25"  # Christmas Day
  us_early_close_2026:
    - "2026-11-27"  # Day after Thanksgiving (13:00 ET close)
    - "2026-12-24"  # Christmas Eve (13:00 ET close)

# -----------------------------------------------------------------------------
# Watchlist (US stocks only — commission-free on Alpaca)
# -----------------------------------------------------------------------------
watchlist:
  # Full SPDR sector set (11 sectors) + SPY + QQQ. 13 tickers gives enough
  # breadth for sector-rotation filters (backlog #6), keeps gap risk low
  # (all ETFs), and is uniformly liquid on the free IEX feed.
  # No individual stocks (earnings-gap risk) and no leveraged ETFs (decay).
  us:
    - "SPY"     # S&P 500 ETF — primary, most validated
    - "QQQ"     # Nasdaq-100 ETF — tech-heavy complement
    - "XLK"     # Technology
    - "XLF"     # Financials
    - "XLV"     # Health Care
    - "XLY"     # Consumer Discretionary
    - "XLP"     # Consumer Staples
    - "XLE"     # Energy
    - "XLI"     # Industrials
    - "XLB"     # Materials
    - "XLU"     # Utilities
    - "XLRE"    # Real Estate
    - "XLC"     # Communication Services
  # Phase 2 expansion — broader ETF set once strategy is proven
  us_phase2:
    - "SPY"
    - "QQQ"
    - "XLF"     # Financial Select Sector SPDR
    - "XLE"     # Energy Select Sector SPDR
    - "XLK"     # Technology Select Sector SPDR
    - "XLV"     # Health Care Select Sector SPDR
  # Phase 3 expansion — mega-caps for intraday mean reversion
  us_phase3:
    - "SPY"
    - "QQQ"
    - "XLF"
    - "XLE"
    - "XLK"
    - "XLV"
    - "AAPL"    # Apple
    - "MSFT"    # Microsoft
    - "NVDA"    # NVIDIA
    - "GOOGL"   # Alphabet
    - "AMZN"    # Amazon
    - "META"    # Meta Platforms

# -----------------------------------------------------------------------------
# Per-Symbol Allocation Caps
# -----------------------------------------------------------------------------
# Cap on how much of the multi-strategy book a single ticker may consume
# (across ALL strategies, summed at entry-price). Prevents one runaway
# position from dominating a 2-position phase-1 book even when each
# individual strategy says "size up". Expressed as a fraction in (0, 1].
# Set default_max_allocation_pct to 1.0 to disable globally.
watchlist_caps:
  default_max_allocation_pct: 0.50    # 50% — no ticker > half the book
  per_symbol:
    SPY: 0.60                         # primary signal source — slightly looser
    QQQ: 0.50
    XLK: 0.35
    XLF: 0.35
    XLV: 0.35
    XLE: 0.30
    XLY: 0.30
    XLP: 0.30
    XLI: 0.30
    XLB: 0.25
    XLU: 0.25
    XLRE: 0.25
    XLC: 0.30

# -----------------------------------------------------------------------------
# Macro-Event Gating (FOMC days)
# -----------------------------------------------------------------------------
# Reduces or skips new entries on Fed announcement days. The bot keeps
# managing existing positions normally — only NEW entries are gated.
# Update fomc_dates_<year> annually from federalreserve.gov.
event_gate:
  enabled: true
  fomc_action: "reduce"               # "skip" (no entries) or "reduce" (scale risk)
  fomc_size_multiplier: 0.50          # used only when fomc_action == "reduce"
  fomc_dates_2026:
    - "2026-01-28"
    - "2026-03-18"
    - "2026-05-06"
    - "2026-06-17"
    - "2026-07-29"
    - "2026-09-16"
    - "2026-11-04"
    - "2026-12-16"

# -----------------------------------------------------------------------------
# Calendar-Effect Overlay (research, ai-broker#47)
# -----------------------------------------------------------------------------
# Sizing multipliers and entry blocks based on persistent calendar
# anomalies (turn-of-month, FOMC drift, OPEX, pre-long-weekend). All
# overlays ship DISABLED — flip on individually after passing the per-
# overlay A/B acceptance bar in the issue. Multipliers compose
# multiplicatively and clamp to [0.0, 2.0].
calendar_overlay:
  enabled: false                      # master switch
  turn_of_month:
    enabled: false
    days_before_month_end: 4
    days_after_month_start: 3
    long_multiplier: 1.2
    short_multiplier: 0.8
    applies_to: ["mean_reversion", "overnight_drift"]
  fomc_drift:
    enabled: false
    hours_before_announcement: 24
    long_multiplier: 1.3
    applies_to: ["overnight_drift"]
  pre_long_weekend:
    enabled: false
    min_weekend_days: 3
    block_strategies: ["overnight_drift"]
  opex:
    enabled: false
    weekday: 4                        # Friday
    week_of_month: 3                  # 3rd Friday
    multiplier: 0.7
    applies_to: ["mean_reversion", "overnight_drift"]

# -----------------------------------------------------------------------------
# Watchlist Quality Criteria
# -----------------------------------------------------------------------------
watchlist_criteria:
  min_avg_daily_volume_us: 5000000
  max_spread_pct_us: 0.0005       # 0.05% as decimal
  max_price_us_usd: 40.00
  min_market_cap_usd: 1000000000  # $1B
  max_symbols_per_sector: 3
  price_limits_by_phase:
    phase1:
      us_usd: 40.0
    phase2:
      us_usd: 100.0
    phase3:
      us_usd: 9999.0              # No practical limit

# -----------------------------------------------------------------------------
# Risk Management
# -----------------------------------------------------------------------------
risk:
  daily_loss_limit_pct: 0.01      # -1% of account equity
  # Vol-targeted sizing (per pysystemtrade). When `annual_vol_pct` > 0,
  # each strategy's risk-per-trade is scaled by the ratio of target
  # per-trade vol to its trailing realized per-trade vol. Strategies with
  # high realized vol shrink, low-vol strategies stretch toward the target.
  # Set annual_vol_pct=0 to disable (no behaviour change).
  vol_target:
    annual_vol_pct: 0.0           # e.g. 0.20 = 20% annualized vol target
    lookback_trades: 30
    trades_per_year: 252
    min_multiplier: 0.5
    max_multiplier: 1.5
  # Optional realized-vol AND-gate on top of the SMA50 regime filter.
  # When > 0, the backtester treats a day as bullish only if SPY > SMA50
  # AND realized vol is below the threshold (annualized). Catches the
  # 2008 / 2018-Q4 crashes the SMA gate alone misses.
  regime:
    high_vol_threshold_pct: 0.0   # e.g. 0.35 = block when 20d realized > 35%
    vol_lookback_days: 20
  max_daily_trades:
    phase1: 10
    phase2: 25
    phase3: 50
  max_positions:
    phase1: 2
    phase2: 4
    phase3: 8
  max_sector_exposure:
    phase1: 1
    phase2: 2
    phase3: 3
  risk_per_trade_pct:
    phase1: 0.02                  # 2% of equity
    phase2: 0.015                 # 1.5%
    phase3: 0.01                  # 1%
  max_position_pct:
    phase1: 0.40                  # 40% of equity
    phase2: 0.25                  # 25%
    phase3: 0.15                  # 15%
  min_position_value:
    phase1:
      us_usd: 50.0
    phase2:
      us_usd: 100.0
    phase3:
      us_usd: 200.0
  drawdown_breaker:
    threshold_pct: 0.05           # 5% from 5-day peak
    rolling_days: 5
    pause_days: 1
    recovery_position_size_pct: 0.50  # 50% size for first 3 trades after breaker
    recovery_trades: 3
  # Per-strategy cooldown after N consecutive losing trades. A profitable
  # exit resets the streak immediately. Pauses ONLY the offending strategy
  # (other sleeves keep trading). Tuning notes: 3 / 240 ≈ "sit out half
  # a session after a 3-loss skid". Set enabled=false to disable.
  consecutive_loss_cooldown:
    enabled: true
    threshold_losses: 3
    cooldown_minutes: 240
  correlation_threshold: 0.85
  order_rejections:
    max_count: 3
    window_minutes: 10
    pause_minutes: 15
    entry_cooldown_minutes: 15

# -----------------------------------------------------------------------------
# Strategy - Technical Indicators
# -----------------------------------------------------------------------------
strategy:
  ema:
    fast_period: 9
    slow_period: 21
    timeframe: "5min"             # 5-minute bars
    crossover_lookback_bars: 3    # Signal valid for 3 bars after crossover
  bollinger:
    period: 20
    std_dev: 2.0
    timeframe: "5min"
    bounce_lookback_bars: 5       # Look back 5 bars for band touch
    squeeze_threshold: 0.02       # bandwidth / middle < this = squeeze
  volume:
    average_period: 20
    multiplier: 1.5               # Current vol must be > 1.5x average
    timeframe: "5min"
  atr:
    period: 14
    rank_lookback_days: 100
    extreme_percentile: 85        # Skip entry if ATR rank >= 85th
    high_percentile: 70           # Reduce size if ATR rank >= 70th
    high_vol_size_reduction: 0.75 # Multiply position size by this
  scan_interval_seconds:
    phase1: 30
    phase2: 15
    phase3: 5

# -----------------------------------------------------------------------------
# Entry Parameters
# -----------------------------------------------------------------------------
entry:
  min_signals_required: 3         # All 3 signals must align in Phase 1
  sentiment_threshold: 0.1        # Normalized score > 0.1 for longs
  sentiment_block_threshold: -0.2 # Block entry if sentiment < -0.2
  no_data_size_multiplier: 0.75   # 75% size when no sentiment data
  spread_max_us_pct: 0.0005       # 0.05%
  spread_wait_seconds: 120        # Wait up to 2 min for spread to narrow
  spread_recheck_seconds: 15      # Recheck spread every 15 sec
  # 2026-05-11: extended 300 → 600. Alpaca's get_order_by_id can lag
  # behind the matching engine by 100s of ms to seconds — a 5-min poll
  # at boundary can return status='new'/filled_qty=0 for an order that
  # already filled, causing _maybe_timeout_entry to mark ENTRY_FAILED
  # and orphan the position. The 10-min window gives Alpaca enough time
  # to propagate the fill across REST endpoints. Combined with the
  # _consistency_check_alpaca_position fallback in order_manager, the
  # bot will also catch any remaining races by treating the Alpaca
  # position list as the source of truth.
  entry_timeout_seconds: 600      # Cancel unfilled entry after 10 min
  # Maximum slop above ask (buys) or below bid (sells) for entry limit
  # orders. Prevents thin-spread / pre-market chasing where a strategy's
  # current_price reference may already sit at ask. 0.002 = 0.2%.
  limit_slop_pct: 0.002
  partial_fill_min_pct: 0.50      # Accept partial fill >= 50%
  cooldown_minutes: 30            # Cooldown after exiting a ticker
  earnings_blackout_hours: 48     # Hours before/after earnings to skip

# -----------------------------------------------------------------------------
# Sentiment
# -----------------------------------------------------------------------------
sentiment:
  cache_ttl_minutes: 30
  refresh_interval_minutes: 30
  finnhub_rate_limit_per_minute: 60
  neutral_position_size_pct: 0.75
  sector_block_threshold: -0.1
  market_reduce_threshold: -0.2
  market_reduce_size_pct: 0.50
  market_close_only_threshold: -0.4
  market_symbols:
    - "SPY"
    - "QQQ"

# -----------------------------------------------------------------------------
# Exit Parameters - Intraday
# -----------------------------------------------------------------------------
exit_intraday:
  stop_loss_pct: 0.02             # -2% from entry
  take_profit_pct: 0.03           # +3% from entry
  trailing_activation_pct: 0.015  # Activate trailing at +1.5%
  trailing_distance_pct: 0.01     # Trail at -1% from high
  time_stop_hours: 4              # Re-evaluate after 4 hours
  time_stop_flat_threshold: 0.005 # +/- 0.5% considered "flat"
  # Recovery / safety nets (consumed by gateway/recovery.py on every tick).
  stale_entry_order_minutes: 5    # Cancel non-stop entry orders older than N min
  eod_flatten_time_et: "15:55"    # ET cutoff: flatten intraday-tagged positions

# -----------------------------------------------------------------------------
# State recovery / reconciliation
# -----------------------------------------------------------------------------
recovery:
  # Don't close DB-only positions whose entry_time is younger than this.
  # Alpaca's positions endpoint can lag a fresh fill by several minutes,
  # so a brand-new entry can briefly look DB-only and trip the mismatch
  # branch — writing a phantom round-trip with NULL exit data. The next
  # tick (outside the grace window) will close it for real if it never
  # appeared.
  fresh_entry_grace_minutes: 10

# -----------------------------------------------------------------------------
# Exit Parameters - Swing
# -----------------------------------------------------------------------------
exit_swing:
  stop_loss_pct: 0.03             # -3% from entry
  take_profit_pct: 0.05           # +5% from entry
  trailing_activation_pct: 0.025  # Activate trailing at +2.5%
  trailing_distance_pct: 0.015    # Trail at -1.5% from high
  max_hold_days: 5                # Maximum hold time in trading days
  daily_review: true              # Re-evaluate swing positions daily

# -----------------------------------------------------------------------------
# Exit Parameters - Phase 2 Overrides
# -----------------------------------------------------------------------------
exit_intraday_phase2:
  stop_loss_pct: 0.015            # -1.5%
  take_profit_pct: 0.025          # +2.5%
  trailing_activation_pct: 0.012
  trailing_distance_pct: 0.008

# -----------------------------------------------------------------------------
# Exit Parameters - Phase 3 Overrides
# -----------------------------------------------------------------------------
exit_intraday_phase3:
  stop_loss_pct: 0.01             # -1.0% (tight scalping)
  take_profit_pct: 0.015          # +1.5%
  trailing_activation_pct: 0.008
  trailing_distance_pct: 0.005

# -----------------------------------------------------------------------------
# Spread-Widening Protection
# -----------------------------------------------------------------------------
exit_spread_protection:
  max_spread_pct: 0.0015          # 0.15% - delay non-emergency exits
  max_delay_seconds: 120          # Max 2 minutes delay
  recheck_interval_seconds: 15

# -----------------------------------------------------------------------------
# Notifications
# -----------------------------------------------------------------------------
notifications:
  ntfy_server: "https://ntfy.sh"
  # Topic names are read from env vars NTFY_TOPIC and NTFY_KILL_TOPIC.
  # ntfy.sh free-tier topics have no auth — anyone with the topic name can
  # subscribe (and read every alert) or publish (including to the kill
  # topic). Generate long random topic names locally and set them via .env
  # for development or as repo secrets for GitHub Actions. If unset, the
  # notifier disables ntfy (the bot still trades, just silently).
  priorities:
    trade_entry: 3
    position_closed: 3
    stop_loss_hit: 4
    daily_loss_limit: 4
    trailing_activated: 2
    daily_summary: 3
    phase_transition: 4
    gateway_disconnect: 5
    gateway_reconnect: 3
    mass_staleness: 4
    kill_switch: 5
    drawdown_breaker: 5
    order_rejection: 3
    excessive_rejections: 4
    max_daily_trades: 3
    bot_startup: 2
    bot_shutdown: 2
  fallback_to_osascript: true
  max_retries: 3
  retry_interval_seconds: 60
  rate_limit_per_minute: 5

# -----------------------------------------------------------------------------
# Phase 0 - Portfolio Cleanup
# -----------------------------------------------------------------------------
phase0:
  enabled: true
  notification_delay_seconds: 300
  scoring:
    liquidity_weight: 25
    market_cap_weight: 20
    exchange_weight: 15
    technical_weight: 15
    sentiment_weight: 10
    loss_weight: 15
  thresholds:
    hold_min_score: 60
    sell_min_score: 30
  sell_strategy:
    start_at_mid: true
    adjust_toward_bid_after_hours: 2
    adjust_to_bid_after_hours: 4
    urgent_adjust_interval_minutes: 30
    market_order_threshold_value: 50

# -----------------------------------------------------------------------------
# Phase Transitions
# -----------------------------------------------------------------------------
phases:
  phase1_to_phase2:
    equity_usd: 5000
    min_trading_days: 40
    min_win_rate_last_n: 0.52
    win_rate_lookback_trades: 20
    positive_pnl_lookback_days: 30
    max_loss_limit_breaches_last_n: 0
    loss_breach_lookback_days: 20
  phase2_to_phase3:
    equity_usd: 20000
    min_trading_days: 60
    min_win_rate_last_n: 0.55
    win_rate_lookback_trades: 40
    min_sharpe_ratio: 1.0
    sharpe_lookback_days: 60
    positive_pnl_lookback_days: 60
  demotion:
    equity_pct_of_threshold: 0.80

# -----------------------------------------------------------------------------
# Reporting
# -----------------------------------------------------------------------------
reporting:
  output_dir: "~/trading_bot_reports"
  daily_report: true
  weekly_report: true
  monthly_report: true
  equity_curve_days: 30
  templates_dir: "trading_bot/reporting/templates"

# -----------------------------------------------------------------------------
# Health Check
# -----------------------------------------------------------------------------
health:
  enabled: true
  host: "0.0.0.0"
  port: 8080

# -----------------------------------------------------------------------------
# Database
# -----------------------------------------------------------------------------
database:
  path: "trading_bot/data/trading_bot.db"
  backup_enabled: true
  backup_interval_hours: 24
  backup_dir: "trading_bot/data/backups"

# -----------------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------------
logging:
  level: "INFO"
  file: "trading_bot/logs/bot.log"
  backup_count: 30
  format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"

# -----------------------------------------------------------------------------
# Backtesting
# -----------------------------------------------------------------------------
backtesting:
  slippage_bps_per_side: 2
  default_sentiment: 0.0
  bar_size: "1 min"

# -----------------------------------------------------------------------------
# Multi-Strategy Configuration
# -----------------------------------------------------------------------------
multi_strategy:
  enabled: true
  # 2026-04-24 objective reframe: sentiment_combo disabled (low edge
  # after 2 iterations). Its $1000 redistributed +$500 each to
  # mean_reversion and breakout — the two highest-PF sleeves in the
  # 13-year SPY backtest. Sentiment signal is still consumed by the
  # bot-wide entry filters (entry.sentiment_block_threshold and
  # sentiment.market_reduce_threshold), just not as a standalone sleeve.
  total_allocation_usd: 5000.0
  comparison_period_days: 252

  # Market regime filter — blocks new entries when SPY < 50-day SMA.
  # Mirrors the gate applied in multi_strategy_backtest.run_daily().
  regime_filter:
    enabled: true
    index_symbol: "SPY"
    sma_period: 50
    cache_ttl_minutes: 30

  strategies:
    # Mean Reversion is the only strategy validated on 13 years of SPY 5-min
    # bars (66.4% win rate, +6.74% total, PF 1.17). Others are disabled until
    # they produce comparable backtest evidence.
    mean_reversion:
      enabled: true
      # 1375 -> 2500 after 2026-04-28 evening walkforward (post PR #11).
      # Re-running the harness on the 13-ETF SPDR sector universe
      # (2020-07-27 to 2026-04-16, 6 yearly windows, no regime filter)
      # showed:
      #   482 trades, WR 52.7%, PF 1.201, OOS Return +47.2%
      #   PF 95% CI [1.006, 1.428] — lower bound > 1.0, statistically
      #   significant. Sharpe lower bound also positive (0.003).
      # Mean reversion is the only strategy with a stable edge across
      # both the 2008-2021 SPY-only and 2020-2026 13-ETF regimes.
      # Capital absorbs the now-disabled breakout sleeve (see below).
      allocation_usd: 2500.0
      max_positions: 3          # hold up to 3 concurrent diversified ETF positions
      rsi_period: 14
      rsi_oversold: 28
      rsi_recovery: 35
      rsi_exit: 55
      stop_loss_pct: 0.02        # fallback when ATR unavailable
      take_profit_pct: 0.03      # fallback when ATR unavailable
      volume_multiplier: 1.3
      oversold_lookback: 5
      require_ema_confirm: false
      ema_confirm_period: 9
      # ATR-based stops/targets (match multi_strategy_backtest._atr_adjusted_stops)
      use_atr_stops: true
      atr_period: 14
      atr_stop_mult: 2.0
      atr_target_mult: 5.0
      atr_trail_mult: 2.5
      atr_activation_mult: 2.5
      # Risk-based position sizing (match multi_strategy_backtest._size_by_risk)
      use_risk_sizing: true
      risk_per_trade_pct: 0.02   # 2% of equity risked per trade (6% if all 3 positions stop out)
      max_position_pct: 0.33     # 33% per position × 3 positions = ~99% of equity deployed
      # Fractional shares: required on $1k capital for SPY/QQQ (~$250+/share).
      # Alpaca supports fractional down to 1/1000000.
      fractional_shares: true
      # Volatility-adaptive RSI oversold thresholds.
      # Uses 20-day realized vol of df_daily closes as a VIX proxy.
      # High vol (≥25%) → stricter threshold (deeper dip = quality signal).
      # Low vol  (≤12%) → looser threshold (more trades when moves are small).
      # Normal regime uses the baseline rsi_oversold.
      # Let winners run past the target. When true:
      #   - ATR target becomes the trailing-stop activation trigger (not a hard exit)
      #   - RSI-normalisation exit is disabled once position is up >= let_winners_run_up_pct
      #   - Trailing stop takes over from that point
      # Exits become: stop loss, or trailing stop.
      let_winners_run: true
      let_winners_run_up_pct: 0.03
      vix_adaptive_rsi: true
      rv_lookback_days: 20
      rv_high_threshold: 25.0
      rv_low_threshold: 12.0
      rsi_oversold_high_vol: 25
      rsi_oversold_low_vol: 30
      # Bollinger Band confirmation (backlog #4, enabled 2026-04-24).
      # Require price to have touched the lower BB within the last 3 bars
      # and closed back above it. Second independent mean-reversion signal
      # complementing RSI — raises conviction, should lift PF.
      require_bb_confirm: true
      bb_period: 20
      bb_std: 2.0
      bb_lookback_bars: 3

    trend_following:
      # DISABLED 2026-04-28 (kept disabled after evening walkforward).
      # First disabled in PR #11 after SPY 13yr walkforward CI dropped:
      #   pre-gate: PF 1.637 CI [1.00, 2.58] — borderline
      #   post-gate: PF 1.034 CI [0.476, 2.555] — not significant
      # Confirmed in 13-ETF 2020-2026 walkforward:
      #   89 trades, WR 29.2%, PF 0.565, OOS Return -15.3%
      # Recent regime is hostile — strong moves break out and keep going
      # past the trail-stop, or fake out immediately. Disable until
      # retuned for the current era.
      enabled: false
      allocation_usd: 0.0
      max_positions: 1
      sma_period: 50
      ema_fast: 9
      ema_slow: 21
      volume_multiplier: 1.5
      trailing_stop_pct: 0.025
      initial_stop_pct: 0.03
      # ATR-anchored stop + trailing distance. Volatility-adaptive exits:
      # tight in calm tape, wider in violent tape. Falls back to the fixed
      # percentages above if ATR can't be computed.
      use_atr_stops: true
      atr_period: 14
      atr_stop_mult: 1.5
      atr_trail_mult: 2.0

    breakout:
      # DISABLED 2026-04-28 evening walkforward (was $2625 enabled in PR #11).
      # The PR #11 read used a SPY-only 13yr walkforward. Re-running on
      # 13-ETF 2020-2026 (the regime the live bot actually trades) showed:
      #   26 trades, WR 11.5%, PF 0.292, OOS Return -17.0%
      # Win rate 11.5% is well below the breakout archetype's natural
      # ~40-50% — breakouts on this universe in this regime fake out
      # hard. Disable until retuned for the current era (e.g. tighter
      # Donchian period, volume confirmation, time-of-day filter).
      # The freed $2625 goes to mean_reversion (+$1125) and overnight_drift
      # (+$1500 with max_pos bumped 1->3 — see below).
      enabled: false
      allocation_usd: 0.0
      max_positions: 1
      breakout_period: 20
      exit_period: 10
      volume_multiplier: 1.5
      stop_loss_pct: 0.03
      # ATR-anchored stop. Donchian exits handle the upside; the stop just
      # needs to scale with regime vol to avoid getting tagged in noise.
      use_atr_stops: true
      atr_period: 14
      atr_stop_mult: 1.5

    # Sentiment Combo DISABLED 2026-04-24 (objective reframe).
    # Two tuning iterations exhausted the parameter search:
    #   iter 1 baseline: 45 trades, PF 1.05, +2.67% over 13 yr
    #   iter 2 tighter:   2 trades, PF 0.79
    # Underlying hypothesis ("sentiment + 1 technical = tradeable edge
    # on ETFs") didn't validate. Sentiment is still used bot-wide as
    # a risk filter / size modifier — see entry.sentiment_block_threshold
    # and sentiment.market_reduce_threshold. Left in config for future
    # re-enable (e.g. archetype switch to earnings-driven single stocks).
    sentiment_combo:
      enabled: false
      allocation_usd: 0.0
      max_positions: 2
      sentiment_threshold: 0.25
      min_technical_signals: 1
      stop_loss_pct: 0.015
      take_profit_pct: 0.025

    # Overnight Drift (backlog #11, enabled 2026-04-24).
    # Buy on the last 5-min bar of the session, sell on the first bar
    # of the next session. Captures the historical overnight equity
    # premium. 3% disaster stop caps gap-down tail risk.
    overnight_drift:
      enabled: true
      # 1000 -> 2500, max_positions 1 -> 3 after 2026-04-28 evening
      # walkforward on 13-ETF universe:
      #   max_pos=1: 1435 trades, PF 1.035, CI [0.892, 1.196],
      #              OOS Return +5.5%
      #   max_pos=3: 4295 trades, PF 1.052, CI [0.964, 1.155],
      #              OOS Return +19.1%
      # max_positions=1 saturates at one trade/day regardless of
      # universe size — we were leaving sector-diversification value
      # on the table. PF holds, CI tightens, OOS return triples.
      allocation_usd: 2500.0
      max_positions: 3
      # Entry fires on the 15:45 5-min bar (covers 15:45-15:49:59 ET).
      # Must fire BEFORE wind-down (15:50) because the backtester skips
      # new entries once wind-down starts. This gives ~15 min before close.
      entry_window_start: "15:40"
      entry_window_end: "15:45"
      stop_loss_pct: 0.03
      position_pct: 0.95
      fractional_shares: true
