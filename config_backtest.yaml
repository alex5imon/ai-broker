# =============================================================================
# Trading Bot Configuration - V4
# =============================================================================
# This file is the single source of truth for all tunable parameters.
# Never hardcode values that belong here.
# =============================================================================

# -----------------------------------------------------------------------------
# Account Settings
# -----------------------------------------------------------------------------
account:
  id: "U5433252"
  base_currency: "GBP"
  trading_mode: "live"              # 'live' or 'backtest'
  phase_override: null              # Set to 0, 1, 2, or 3 to force a phase (null = auto-detect)

# -----------------------------------------------------------------------------
# IB Gateway Connection
# -----------------------------------------------------------------------------
gateway:
  host: "127.0.0.1"
  port: 4001
  client_id: 1
  timeout_seconds: 30
  heartbeat_interval_seconds: 30
  max_reconnect_attempts: 5
  reconnect_backoff_base_seconds: 30
  reconnect_wait_after_failure_seconds: 300

# -----------------------------------------------------------------------------
# Market Data
# -----------------------------------------------------------------------------
market_data:
  staleness_threshold_seconds: 30
  resubscribe_wait_seconds: 15
  resubscribe_retry_seconds: 60
  mass_staleness_pct: 0.50
  mass_staleness_resume_pct: 0.25

# -----------------------------------------------------------------------------
# Market Schedule
# -----------------------------------------------------------------------------
schedule:
  lse:
    pre_market_scan_start: "07:45"  # GMT
    pre_market_scan_end: "08:00"
    market_open: "08:00"
    execution_start: "08:05"        # Skip first 5 min
    execution_end: "16:00"
    wind_down_start: "16:00"
    wind_down_end: "16:25"
    market_close: "16:30"
    timezone: "Europe/London"
  us:
    pre_market_scan_start: "09:15"  # ET
    pre_market_scan_end: "09:30"
    market_open: "09:30"
    execution_start: "09:35"        # Skip first 5 min
    execution_end: "15:50"
    wind_down_start: "15:50"
    wind_down_end: "15:58"
    market_close: "16:00"
    timezone: "US/Eastern"
  warmup_minutes: 15
  late_start_close_only_after_us: "15:30"   # ET - US market
  late_start_close_only_after_lse: "16:00"  # GMT - LSE market
  bot_start_gmt: "07:45"
  bot_end_gmt: "21:00"

# -----------------------------------------------------------------------------
# Holiday Calendars (update annually)
# -----------------------------------------------------------------------------
holidays:
  uk_2026:
    - "2026-01-01"  # New Year's Day
    - "2026-04-03"  # Good Friday
    - "2026-04-06"  # Easter Monday
    - "2026-05-04"  # Early May Bank Holiday
    - "2026-05-25"  # Spring Bank Holiday
    - "2026-08-31"  # Summer Bank Holiday
    - "2026-12-25"  # Christmas Day
    - "2026-12-28"  # Boxing Day (substitute)
  us_2026:
    - "2026-01-01"  # New Year's Day
    - "2026-01-19"  # MLK Day
    - "2026-02-16"  # Presidents' Day
    - "2026-04-03"  # Good Friday
    - "2026-05-25"  # Memorial Day
    - "2026-06-19"  # Juneteenth
    - "2026-07-03"  # Independence Day (observed)
    - "2026-09-07"  # Labor Day
    - "2026-11-26"  # Thanksgiving
    - "2026-12-25"  # Christmas Day
  us_early_close_2026:
    - "2026-11-27"  # Day after Thanksgiving (13:00 ET close)
    - "2026-12-24"  # Christmas Eve (13:00 ET close)

# -----------------------------------------------------------------------------
# Watchlist
# -----------------------------------------------------------------------------
watchlist:
  # Note: LSE stocks are priced in pence (GBX) by IB. Convert to GBP (÷100) for all calculations.
  lse:
    - "LLOY"    # Lloyds Banking Group
    - "BARC"    # Barclays
    - "VOD"     # Vodafone
    - "BP."     # BP
    - "IAG"     # International Airlines Group
    - "RR."     # Rolls-Royce (if retained from Phase 0)
    - "GLEN"    # Glencore
  us:
    - "F"       # Ford Motor
    - "AAL"     # American Airlines
    - "SOFI"    # SoFi Technologies
    - "BAC"     # Bank of America
    - "PLTR"    # Palantir Technologies
    - "NIO"     # NIO Inc
    - "SNAP"    # Snap Inc
    - "INTC"    # Intel Corporation
  # Phase 2 additions (activated automatically on phase transition)
  us_phase2:
    - "XLF"     # Financial Select Sector SPDR
    - "XLE"     # Energy Select Sector SPDR
    - "XLK"     # Technology Select Sector SPDR
    - "T"       # AT&T
    - "UBER"    # Uber Technologies
    - "XLV"     # Health Care Select Sector SPDR
  lse_phase2:
    - "HSBA"    # HSBC Holdings
    - "AZN"     # AstraZeneca
    - "SHEL"    # Shell
  # Phase 3 additions
  us_phase3:
    - "AAPL"    # Apple
    - "MSFT"    # Microsoft
    - "NVDA"    # NVIDIA
    - "GOOGL"   # Alphabet
    - "AMZN"    # Amazon
    - "META"    # Meta Platforms
    - "SQQQ"    # ProShares UltraPro Short QQQ (inverse ETF)
    - "SDS"     # ProShares UltraShort S&P500 (inverse ETF)

# -----------------------------------------------------------------------------
# Watchlist Quality Criteria
# -----------------------------------------------------------------------------
watchlist_criteria:
  min_avg_daily_volume_lse: 1000000
  min_avg_daily_volume_us: 5000000
  max_spread_pct_lse: 0.001       # 0.1% as decimal
  max_spread_pct_us: 0.0005       # 0.05% as decimal
  max_price_lse_gbp: 20.00
  max_price_us_usd: 40.00
  min_market_cap_usd: 1000000000  # $1B
  max_symbols_per_sector: 3
  price_limits_by_phase:
    phase1:
      lse_gbp: 20.0
      us_usd: 40.0
    phase2:
      lse_gbp: 100.0
      us_usd: 100.0
    phase3:
      lse_gbp: 9999.0    # No practical limit
      us_usd: 9999.0      # No practical limit

# -----------------------------------------------------------------------------
# Risk Management
# -----------------------------------------------------------------------------
risk:
  daily_loss_limit_pct: 0.01      # -1% of account equity
  max_daily_trades:
    phase1: 10
    phase2: 25
    phase3: 50
  max_positions:
    phase1: 2
    phase2: 4
    phase3: 8
  max_sector_exposure:
    phase1: 1
    phase2: 2
    phase3: 3
  risk_per_trade_pct:
    phase1: 0.02                  # 2% of equity
    phase2: 0.015                 # 1.5%
    phase3: 0.01                  # 1%
  max_position_pct:
    phase1: 0.40                  # 40% of equity
    phase2: 0.25                  # 25%
    phase3: 0.15                  # 15%
  min_position_value:
    phase1:
      lse_gbp: 150.0   # Stamp duty makes smaller LSE trades uneconomical
      us_usd: 50.0
    phase2:
      lse_gbp: 200.0
      us_usd: 100.0
    phase3:
      lse_gbp: 300.0
      us_usd: 200.0
  drawdown_breaker:
    threshold_pct: 0.05           # 5% from 5-day peak
    rolling_days: 5
    pause_days: 1
    recovery_position_size_pct: 0.50  # 50% size for first 3 trades after breaker
    recovery_trades: 3
  correlation_threshold: 0.85
  commission_budget:
    warning_ratio: 0.20           # Warn if commissions > 20% of gross P&L
    stop_ratio: 0.50              # Stop new entries if > 50%
    elevated_cooldown_minutes: 60
  order_rejections:
    max_count: 3
    window_minutes: 10
    pause_minutes: 15
    entry_cooldown_minutes: 15

# -----------------------------------------------------------------------------
# Strategy - Technical Indicators
# -----------------------------------------------------------------------------
strategy:
  ema:
    fast_period: 9
    slow_period: 21
    timeframe: "5min"             # 5-minute bars
    crossover_lookback_bars: 3    # Signal valid for 3 bars after crossover
  bollinger:
    period: 20
    std_dev: 2.0
    timeframe: "5min"
    bounce_lookback_bars: 5       # Look back 5 bars for band touch
    squeeze_threshold: 0.02       # bandwidth / middle < this = squeeze
  volume:
    average_period: 20
    multiplier: 1.5               # Current vol must be > 1.5x average
    timeframe: "5min"
  atr:
    period: 14
    rank_lookback_days: 100
    extreme_percentile: 92        # Skip entry if ATR rank >= 92nd (less aggressive filter)
    high_percentile: 80           # Reduce size if ATR rank >= 80th
    high_vol_size_reduction: 0.75 # Multiply position size by this
  scan_interval_seconds:
    phase1: 30
    phase2: 15
    phase3: 5

# -----------------------------------------------------------------------------
# Entry Parameters
# -----------------------------------------------------------------------------
entry:
  min_signals_required: 2         # 2 of 3 signals required (tuned for backtest)
  sentiment_threshold: 0.1        # Normalized score > 0.1 for longs
  sentiment_block_threshold: -0.2 # Block entry if sentiment < -0.2
  no_data_size_multiplier: 0.75   # 75% size when no sentiment data
  commission_max_pct: 0.02        # Round-trip commission < 2% of position
  spread_max_lse_pct: 0.001       # 0.1%
  spread_max_us_pct: 0.0005       # 0.05%
  spread_wait_seconds: 120        # Wait up to 2 min for spread to narrow
  spread_recheck_seconds: 15      # Recheck spread every 15 sec
  entry_timeout_seconds: 300      # Cancel unfilled entry after 5 min
  partial_fill_min_pct: 0.50      # Accept partial fill >= 50%
  cooldown_minutes: 30            # Cooldown after exiting a ticker
  earnings_blackout_hours: 48     # Hours before/after earnings to skip

# -----------------------------------------------------------------------------
# Sentiment
# -----------------------------------------------------------------------------
sentiment:
  cache_ttl_minutes: 30
  refresh_interval_minutes: 30
  finnhub_rate_limit_per_minute: 60
  neutral_position_size_pct: 0.75
  sector_block_threshold: -0.1
  market_reduce_threshold: -0.2
  market_reduce_size_pct: 0.50
  market_close_only_threshold: -0.4
  market_symbols:               # Not in watchlist but used for market sentiment
    - "SPY"
    - "QQQ"

# -----------------------------------------------------------------------------
# Exit Parameters - Intraday
# -----------------------------------------------------------------------------
exit_intraday:
  stop_loss_pct: 0.012            # -1.2% from entry (tighter for intraday)
  take_profit_pct: 0.018          # +1.8% from entry (achievable intraday)
  trailing_activation_pct: 0.01   # Activate trailing at +1.0%
  trailing_distance_pct: 0.006    # Trail at -0.6% from high
  time_stop_hours: 4              # Re-evaluate after 4 hours
  time_stop_flat_threshold: 0.003 # +/- 0.3% considered "flat"

# -----------------------------------------------------------------------------
# Exit Parameters - Swing
# -----------------------------------------------------------------------------
exit_swing:
  stop_loss_pct: 0.03             # -3% from entry
  take_profit_pct: 0.05           # +5% from entry
  trailing_activation_pct: 0.025  # Activate trailing at +2.5%
  trailing_distance_pct: 0.015    # Trail at -1.5% from high
  max_hold_days: 5                # Maximum hold time in trading days
  daily_review: true              # Re-evaluate swing positions daily
# Note: Swing exit parameters are intentionally the same across all phases.
# The wider stops suit longer hold times regardless of account size.
# Phase-specific changes only apply to intraday exits.

# -----------------------------------------------------------------------------
# Exit Parameters - Phase 2 Overrides
# -----------------------------------------------------------------------------
exit_intraday_phase2:
  stop_loss_pct: 0.015            # -1.5%
  take_profit_pct: 0.025          # +2.5%
  trailing_activation_pct: 0.012
  trailing_distance_pct: 0.008

# -----------------------------------------------------------------------------
# Exit Parameters - Phase 3 Overrides
# -----------------------------------------------------------------------------
exit_intraday_phase3:
  stop_loss_pct: 0.01             # -1.0% (tight scalping)
  take_profit_pct: 0.015          # +1.5%
  trailing_activation_pct: 0.008
  trailing_distance_pct: 0.005

# -----------------------------------------------------------------------------
# Spread-Widening Protection
# -----------------------------------------------------------------------------
exit_spread_protection:
  max_spread_pct: 0.0015          # 0.15% - delay non-emergency exits
  max_delay_seconds: 120          # Max 2 minutes delay
  recheck_interval_seconds: 15

# -----------------------------------------------------------------------------
# Notifications
# -----------------------------------------------------------------------------
notifications:
  ntfy_server: "https://ntfy.sh"
  ntfy_topic: "trading-bot-U5433252"
  ntfy_kill_topic: "trading-bot-kill-U5433252"
  priorities:
    trade_entry: 3                # Default
    position_closed: 3
    stop_loss_hit: 4              # High
    daily_loss_limit: 4
    trailing_activated: 2         # Low
    daily_summary: 3
    phase0_cleanup: 4
    phase_transition: 4
    gateway_disconnect: 5         # Urgent
    gateway_reconnect: 3
    mass_staleness: 4
    kill_switch: 5
    drawdown_breaker: 5
    order_rejection: 3
    excessive_rejections: 4
    max_daily_trades: 3
    commission_alert: 3
    bot_startup: 2
    bot_shutdown: 2
  fallback_to_osascript: true
  max_retries: 3
  retry_interval_seconds: 60
  rate_limit_per_minute: 5

# -----------------------------------------------------------------------------
# Settlement
# -----------------------------------------------------------------------------
settlement:
  t_plus_days: 1                  # T+1 for equities
  # Business day calculation accounts for weekends and holidays

# -----------------------------------------------------------------------------
# FX
# -----------------------------------------------------------------------------
fx:
  # base_currency inherited from account.base_currency
  trading_currencies: ["GBP", "USD"]
  refresh_interval_seconds: 60
  fallback_gbp_usd: 1.27         # Used only if IB FX data unavailable

# -----------------------------------------------------------------------------
# Phase 0 - Portfolio Cleanup
# -----------------------------------------------------------------------------
phase0:
  enabled: true
  notification_delay_seconds: 300 # Wait 5 min after notifying before executing
  scoring:
    liquidity_weight: 25
    market_cap_weight: 20
    exchange_weight: 15
    technical_weight: 15
    sentiment_weight: 10
    loss_weight: 15
  thresholds:
    hold_min_score: 60
    sell_min_score: 30
    # Below 30 = urgent sell
  sell_strategy:
    start_at_mid: true
    adjust_toward_bid_after_hours: 2
    adjust_to_bid_after_hours: 4
    urgent_adjust_interval_minutes: 30
    market_order_threshold_value: 50  # Use market if position < $50 after 4h

# -----------------------------------------------------------------------------
# Phase Transitions
# -----------------------------------------------------------------------------
phases:
  phase1_to_phase2:
    equity_gbp: 5000
    min_trading_days: 40
    min_win_rate_last_n: 0.52     # 52% over last 20 trades
    win_rate_lookback_trades: 20
    positive_pnl_lookback_days: 30
    max_loss_limit_breaches_last_n: 0
    loss_breach_lookback_days: 20
  phase2_to_phase3:
    equity_gbp: 20000
    min_trading_days: 60
    min_win_rate_last_n: 0.55     # 55% over last 40 trades
    win_rate_lookback_trades: 40
    min_sharpe_ratio: 1.0
    sharpe_lookback_days: 60
    positive_pnl_lookback_days: 60
  demotion:
    equity_pct_of_threshold: 0.80 # Demote if equity < 80% of phase threshold

# -----------------------------------------------------------------------------
# Reporting
# -----------------------------------------------------------------------------
reporting:
  output_dir: "~/trading_bot_reports"
  daily_report: true
  weekly_report: true
  monthly_report: true
  equity_curve_days: 30           # Show last 30 days on chart
  templates_dir: "trading_bot/reporting/templates"

# -----------------------------------------------------------------------------
# Health Check
# -----------------------------------------------------------------------------
health:
  enabled: true
  host: "0.0.0.0"
  port: 8080

# -----------------------------------------------------------------------------
# Database
# -----------------------------------------------------------------------------
database:
  path: "trading_bot/data/trading_bot.db"
  backup_enabled: true
  backup_interval_hours: 24
  backup_dir: "trading_bot/data/backups"

# -----------------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------------
logging:
  level: "INFO"                   # DEBUG, INFO, WARNING, ERROR, CRITICAL
  file: "trading_bot/logs/bot.log"
  backup_count: 30                # Keep 30 days of daily log files
  format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"

# -----------------------------------------------------------------------------
# Backtesting
# -----------------------------------------------------------------------------
backtesting:
  slippage_bps_per_side: 2        # 2 basis points per side
  commission_model: "ib_tiered"   # Use IB tiered commission schedule
  default_sentiment: 0.0          # Assume neutral if no cached data
  bar_size: "1 min"               # Request 1-min bars from IB
