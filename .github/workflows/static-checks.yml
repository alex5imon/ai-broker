name: static-checks

# Cheap static guards on the live trading path.
#
#   1. scripts/check_live_path.sh — bans sync client.submit_order() in
#      async execution code, and bans naive date.today() / datetime.now()
#      in live-path modules. Encodes lessons from PR #52, #56, and the
#      overnight_drift naive-date fix.
#   2. ruff check across the whole repo. Cleaned up 2026-05-07 (PR after
#      #83); this gate keeps the noise from creeping back.
#   3. bandit -lll — HIGH-severity security findings only (eval, exec,
#      subprocess shell=True, weak crypto, hardcoded passwords).
#      MEDIUM is noisy on this codebase: f-string SQL with bound `?`
#      placeholders and the intentional 0.0.0.0 health bind both trip
#      it. Tighten to MEDIUM once those are individually nosec'd.
#   4. pip-audit — known-vulnerable dependency versions.
#   5. mypy --strict-equality on the critical path only (execution,
#      strategy, gateway, main, config). Backtester / self_improve /
#      reporting / tests are excluded — they don't run on the live tick
#      and would drown the signal in noise.
#   6. pytest -m critical — fast subset (the markers tag the modules
#      exercising order placement, risk gates, and the tick loop).
#
# This runs on every push and PR. Must stay fast (<60s) so contributors
# get immediate feedback. The full pytest suite still runs in
# pre-open-check.yml against paper.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  static-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          # Cache invalidates when either file changes. requirements-dev.txt
          # holds the pinned static-analysis tools (ruff/mypy/bandit/
          # pip-audit) so setup-python warms them up alongside the
          # trading deps, instead of cold-installing them every run.
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install deps
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Live-path regex guards
        run: bash scripts/check_live_path.sh

      - name: Ruff (whole repo)
        # Whole-repo gate after the 2026-05-07 cleanup pass that cleared
        # 75 errors (53 auto-fixed, 22 manual). Includes backtester,
        # scripts/, and tests/ — all clean today. Adding new lint
        # violations is now blocked at PR time so the noise doesn't
        # creep back.
        run: ruff check .

      - name: Bandit (HIGH severity)
        # HIGH-only gate: eval/exec, subprocess shell=True, weak crypto,
        # hardcoded passwords, pickle on untrusted data. MEDIUM is
        # currently noisy (parameterised SQL with f-string placeholders
        # for `?,?,?`, intentional 0.0.0.0 health bind) and would
        # require ~6 #nosec annotations to clean — separate task.
        run: bandit -r trading_bot/ -lll -q

      - name: pip-audit
        # Hard gate on known-vulnerable dependency versions. No findings
        # today; this locks in the baseline.
        run: pip-audit -r requirements.txt

      - name: Mypy (critical path)
        run: |
          mypy \
            --ignore-missing-imports \
            --no-strict-optional \
            trading_bot/main.py \
            trading_bot/config.py \
            trading_bot/execution/ \
            trading_bot/gateway/ \
            trading_bot/strategy/base.py \
            trading_bot/strategy/entry.py \
            trading_bot/strategy/strategy_manager.py \
            trading_bot/utils/time.py
        # mypy is advisory: surface signal without blocking the gate
        # while we whittle down existing untyped code in the strategies/
        # subdirectory. Promote to required once the noise is gone.
        continue-on-error: true

      - name: Pytest critical-path subset
        run: pytest -m critical -q --tb=short trading_bot/tests/
