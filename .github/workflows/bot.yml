name: bot

on:
  schedule:
    # Every 5 min during a generous weekday UTC window covering NYSE 09:30-16:00 ET.
    # Actual NYSE-open gating happens in code (calendar.py + Alpaca clock).
    - cron: "*/5 13-21 * * 1-5"
  workflow_dispatch: {}

concurrency:
  group: bot-run
  # Ticks are stateless (state is restored from cache each run), so it is
  # safe to supersede an in-flight run with a newer one. This prevents a
  # wedged run (e.g. hosted-runner shortage) from blocking the queue and
  # turning subsequent dispatches into cancellations.
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    # Real per-tick work takes seconds; capping below the 5-min cron interval
    # ensures one stuck run cannot block more than a single subsequent tick.
    timeout-minutes: 4
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Restore state
        uses: actions/cache@v5
        with:
          path: state
          key: bot-state-${{ github.run_id }}
          restore-keys: |
            bot-state-

      - name: Restore SQLite DB
        uses: actions/cache@v5
        with:
          path: trading_bot/data/trading_bot.db*
          key: bot-db-${{ github.run_id }}
          restore-keys: |
            bot-db-

      - name: Run bot
        env:
          # trading_bot.env.resolve_alpaca_env picks the right pair based on ALPACA_ENV.
          ALPACA_ENV: ${{ vars.ALPACA_ENV || 'paper' }}
          ALPACA_PAPER_KEY_ID: ${{ secrets.ALPACA_PAPER_KEY_ID }}
          ALPACA_PAPER_SECRET: ${{ secrets.ALPACA_PAPER_SECRET }}
          ALPACA_LIVE_KEY_ID: ${{ secrets.ALPACA_LIVE_KEY_ID }}
          ALPACA_LIVE_SECRET: ${{ secrets.ALPACA_LIVE_SECRET }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          # ntfy.sh topic names — set as repo secrets. If absent, the
          # notifier disables ntfy gracefully and the bot still trades.
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_KILL_TOPIC: ${{ secrets.NTFY_KILL_TOPIC }}
          BOT_LOG_DIR: logs
          BOT_STATE_DIR: state
        run: python -m trading_bot.main --mode normal

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: bot-logs-${{ github.run_id }}
          path: logs/
          retention-days: 30

      - name: Upload state
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: bot-state-${{ github.run_id }}
          path: state/
          retention-days: 30

      - name: Upload SQLite DB
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: bot-db-${{ github.run_id }}
          path: trading_bot/data/trading_bot.db*
          retention-days: 30
          if-no-files-found: ignore
