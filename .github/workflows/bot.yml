name: bot

on:
  schedule:
    # Every 5 min during a generous weekday UTC window covering NYSE 09:30-16:00 ET.
    # Actual NYSE-open gating happens in code (calendar.py + Alpaca clock).
    - cron: "*/5 13-21 * * 1-5"
  workflow_dispatch: {}

concurrency:
  group: bot-run
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Restore state
        uses: actions/cache@v4
        with:
          path: state
          key: bot-state-${{ github.run_id }}
          restore-keys: |
            bot-state-

      - name: Restore SQLite DB
        uses: actions/cache@v4
        with:
          path: trading_bot/data/trading_bot.db*
          key: bot-db-${{ github.run_id }}
          restore-keys: |
            bot-db-

      - name: Run bot
        env:
          ALPACA_ENV: ${{ vars.ALPACA_ENV || 'paper' }}
          ALPACA_API_KEY_ID: ${{ vars.ALPACA_ENV == 'live' && secrets.ALPACA_LIVE_KEY_ID || secrets.ALPACA_PAPER_KEY_ID }}
          ALPACA_API_SECRET: ${{ vars.ALPACA_ENV == 'live' && secrets.ALPACA_LIVE_SECRET || secrets.ALPACA_PAPER_SECRET }}
          BOT_LOG_DIR: logs
          BOT_STATE_DIR: state
        run: python -m bot.run

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-logs-${{ github.run_id }}
          path: logs/
          retention-days: 30

      - name: Upload state
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-state-${{ github.run_id }}
          path: state/
          retention-days: 30

      - name: Upload SQLite DB
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-db-${{ github.run_id }}
          path: trading_bot/data/trading_bot.db*
          retention-days: 30
          if-no-files-found: ignore
